# =============================================
# Docker Compose - CRM360 Monterrey Frontend
# =============================================
# USO:
#   Produccion:   docker-compose up crm360-front-prod --build
#   Desarrollo:   docker-compose up crm360-front-dev --build
#   Parar:        docker-compose down
# =============================================

services:

  # --- PRODUCCION: Nginx + Build optimizado ---
  crm360-front-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm360-front-prod
    ports:
      - "4200:80"
    restart: unless-stopped

  # --- DESARROLLO: ng serve + hot-reload ---
  # Requiere: npm install --legacy-peer-deps (local) antes de levantar
  crm360-front-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: crm360-front-dev
    ports:
      - "4200:4200"
    volumes:
      - .:/app
    restart: unless-stopped
