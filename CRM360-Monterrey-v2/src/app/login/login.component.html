<div class="login-wrapper">
  <div class="background-overlay"></div>
  
  <div class="login-content">
    <img src="images/logo/Logo_RIA_Green.png" class="top-logo" alt="Logo RIA" *ngIf="false"> <!-- Oculto temporalmente si no es necesario -->

    <mat-card appearance="outlined" class="login-card mat-elevation-z4">
      <div class="logo-wrapper">
        <img src="images/logo/crm-360.png" alt="CRM 360" (error)="onLogoClienteError($event)">
      </div>

      <div class="header-titles">
        <h2>Inicie Sesión</h2>
        <p>Control de Acceso</p>
      </div>

      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Usuario</mat-label>
            <input matInput formControlName="usuario" placeholder="Ingrese su Usuario">
            <mat-icon matPrefix>person</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Contraseña</mat-label>
            <input matInput [type]="passwordType()" formControlName="senha" placeholder="Contraseña">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()" aria-label="Mostrar/Ocultar contraseña">
              <mat-icon>{{passwordType() === 'password' ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
          </mat-form-field>

          <div class="options-row mb-3">
            <mat-checkbox color="primary" class="remember-me">Recuérdame</mat-checkbox>
          </div>

          <button mat-flat-button color="primary" type="submit" class="submit-btn" [disabled]="form.invalid || waitingLoginResponse()">
            @if (waitingLoginResponse()) {
              Validando...
            } @else {
              Ingresar
            }
          </button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
